[profile.default]
src = "contracts"
test = "contracts/test"
out = "forge-out"
libs = ["lib"]
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200

[invariant]
runs = 64
depth = 64

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
base = "${BASE_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
optimism = "${OPTIMISM_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"
deploy = "${DEPLOY_RPC_URL}"
