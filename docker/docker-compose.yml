services:
  keeper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    init: true
    volumes:
      - ../config.json:/app/config.json:ro
      - keeper-cache:/app/.cache/pool-discovery
      # Optional secret mounts. Pair these with *_FILE or KEYSTORE_* paths in ../.env.
      # For a local operator override template, see docker/docker-compose.secrets.example.yml.
      # - ../secrets/trading.key:/run/secrets/trading.key:ro
      # - ../secrets/flashbots-auth.key:/run/secrets/flashbots-auth.key:ro
      # - ../secrets/trading.keystore.json:/run/secrets/trading.keystore.json:ro
      # - ../secrets/trading.keystore.password:/run/secrets/trading.keystore.password:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    stop_grace_period: 35s
    env_file:
      - ../.env
    environment:
      CONFIG_PATH: /app/config.json
      LOG_LEVEL: info
      # Example values to place in ../.env:
      # PRIVATE_KEY_FILE=/run/secrets/trading.key
      # FLASHBOTS_AUTH_KEY_FILE=/run/secrets/flashbots-auth.key
      # KEYSTORE_PATH=/run/secrets/trading.keystore.json
      # KEYSTORE_PASSWORD_FILE=/run/secrets/trading.keystore.password

volumes:
  keeper-cache:
