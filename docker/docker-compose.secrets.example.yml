services:
  keeper:
    volumes:
      # Copy this file to docker/docker-compose.override.yml and edit the
      # host-side paths on the left if your secrets do not live under ../secrets/.

      # Optional: API provider keys
      - ../secrets/coingecko.key:/run/secrets/coingecko.key:ro
      - ../secrets/alchemy.key:/run/secrets/alchemy.key:ro
      - ../secrets/rpc-provider.key:/run/secrets/rpc-provider.key:ro

      # Option A: raw trading key
      # - ../secrets/trading.key:/run/secrets/trading.key:ro

      # Option B: encrypted trading keystore
      - ../secrets/trading.keystore.json:/run/secrets/trading.keystore.json:ro
      - ../secrets/trading.keystore.password:/run/secrets/trading.keystore.password:ro

      # Optional: persist Flashbots relay identity
      - ../secrets/flashbots-auth.key:/run/secrets/flashbots-auth.key:ro
